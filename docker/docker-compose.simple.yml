version: '3.8'

services:
  # SSKit 应用服务（Java + Nginx），使用外部数据库
  app:
    image: crpi-y0o15ai0lgj1soh9.cn-hangzhou.personal.cr.aliyuncs.com/nbyiansec/sskit:${TAG}
    container_name: sskit-app
    restart: unless-stopped
    environment:
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_DB_NAME: ${MYSQL_DB_NAME}
      MYSQL_USERNAME: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JAVA_OPTS: ${JAVA_OPTS}
    volumes:
      - app_logs:/opt/sskit/logs
    ports:
      - "${NGINX_PORT}:57701"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:57702/sskit/api/system/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  app_logs:
    driver: local
